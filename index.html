<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make your TODO List</title>
    <!-- <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="card">
        <div class="container">

            <h1>Make your TODO List</h1>
            <p>Stay organized, stay productive ✦</p>
            <p id="inner">Add your items here
                <i class="fa-solid fa-pencil" width="20" height="20"></i>
            </p>
            <div class="input">
                <input type="text" placeholder="Your item..." />
                <button class="submit">+ Submit</button>

            </div>

            <div class="items">
                <h5>Your Tasks</h5>
                <ul>
                </ul>
            </div>

            <!-- clear all -->
            <div class="bottom-row">
                <button class="clearAll">
                    <i class="fa-solid fa-trash-can"></i> Clear All
                </button>
            </div>
        </div>





    </div>
    <script src="script.js"></script>
</body>

</html>
